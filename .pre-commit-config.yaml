repos:
    - repo: https://github.com/pre-commit/pre-commit-hooks
      rev: v4.6.0
      hooks:
          - id: trailing-whitespace
            exclude: ^foundry\.lock$
          - id: end-of-file-fixer
            exclude: ^foundry\.lock$
          - id: check-yaml

    - repo: https://github.com/pre-commit/mirrors-prettier
      rev: v3.1.0
      hooks:
          - id: prettier
            exclude: ^foundry\.lock$
